    <script>
        function editSubmission(button) {
            var row = button.closest('tr');

            document.getElementById('editId').value = row.getAttribute('data-id');
            document.getElementById('editName').value = row.getAttribute('data-name');
            document.getElementById('editPhone').value = row.getAttribute('data-phone');
            document.getElementById('editEmail').value = row.getAttribute('data-email');
            document.getElementById('editBirthDate').value = row.getAttribute('data-birth');
            document.getElementById('editGender').value = row.getAttribute('data-gender');
            document.getElementById('editAbout').value = row.getAttribute('data-about');
            document.getElementById('editContract').checked = (row.getAttribute('data-contract') == '1');

            var checkboxes = document.getElementsByClassName('lang-checkbox');
            for (var i = 0; i < checkboxes.length; i++) {
                checkboxes[i].checked = false;
            }

            var langs = row.getAttribute('data-langs');
            if (langs) {
                var langArray = langs.split(',');
                for (var i = 0; i < langArray.length; i++) {
                    var checkbox = document.querySelector('.lang-checkbox[value="' + langArray[i] + '"]');
                    if (checkbox) checkbox.checked = true;
                }
            }

            document.getElementById('editModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        window.onclick = function (event) {
            if (event.target == document.getElementById('editModal')) {
                closeModal();
            }
        };
    </script>
</body>
