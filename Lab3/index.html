<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрационная форма</title>
    <style>
        .main {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f9f9f9;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

            select[multiple] {
                height: 150px;
            }

        .radio-group {
            display: inline-block;
            margin-right: 15px;
        }

            .radio-group label {
                display: inline-block;
                font-weight: normal;
            }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

            button:hover {
                background: #45a049;
            }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        .success {
            color: green;
            background: #d4edda;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <form class="main" action="form.php" method="POST" id="registrationForm">
        <h2>Форма регистрации</h2>

        <div class="form-group">
            <label>ФИО: *</label>
            <input type="text" name="full_name" required placeholder="Иванов Иван Иванович">
        </div>

        <div class="form-group">
            <label>Телефон: *</label>
            <input type="tel" name="phone" required value="+7" placeholder="+7XXXXXXXXXX">
        </div>

        <div class="form-group">
            <label>Email: *</label>
            <input type="email" name="email" required placeholder="example@mail.ru">
        </div>

        <div class="form-group">
            <label>Дата рождения: *</label>
            <input type="date" name="birth_date" required>
        </div>

        <div class="form-group">
            <label>Пол:</label>
            <div class="radio-group">
                <input type="radio" name="gender" value="Мужчина" id="male">
                <label for="male">Мужчина</label>
            </div>
            <div class="radio-group">
                <input type="radio" name="gender" value="Женщина" id="female">
                <label for="female">Женщина</label>
            </div>
        </div>

        <div class="form-group">
            <label>Любимые языки программирования: *</label>
            <select name="favorite_langs[]" multiple required>
                <option value="Pascal">Pascal</option>
                <option value="C">C</option>
                <option value="C++">C++</option>
                <option value="JavaScript">JavaScript</option>
                <option value="PHP">PHP</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="Haskel">Haskel</option>
                <option value="Clojure">Clojure</option>
                <option value="Prolog">Prolog</option>
                <option value="Scala">Scala</option>
            </select>
            <small>Удерживайте Ctrl (или Cmd на Mac) для выбора нескольких языков</small>
        </div>

        <div class="form-group">
            <label>Расскажите о себе:</label>
            <textarea name="about_self" rows="5" placeholder="Ваши навыки, опыт, интересы..."></textarea>
        </div>

        <div class="form-group">
            <input type="checkbox" name="contract" value="1" required>
            <label style="display: inline-block; font-weight: normal;">С контрактом ознакомлен *</label>
        </div>

        <button type="submit">Отправить</button>
    </form>
</body>
</html>
